<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASE ESG Integrity Portal | Powered by ProtoQol</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(15, 20, 28, 0.7);
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.3);
            --text: #e0e0e0;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #0a1219 0%, #05070a 100%);
        }

        .dashboard {
            width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo { font-size: 1.5rem; font-weight: 600; color: var(--accent); letter-spacing: 2px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        textarea, input {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border);
            border-radius: 12px; padding: 15px; color: white; font-family: inherit; margin-bottom: 15px;
        }

        .btn {
            background: var(--accent); color: black; border: none; padding: 16px;
            border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s;
        }

        .btn:hover { box-shadow: 0 10px 20px var(--accent-glow); transform: translateY(-2px); }

        #result-box {
            background: rgba(0, 0, 0, 0.5); border: 1px dashed var(--border);
            border-radius: 12px; padding: 25px; font-family: 'JetBrains Mono', monospace;
            min-height: 300px; visibility: hidden; position: relative;
        }

        .status-line { margin-bottom: 10px; font-size: 0.85rem; opacity: 0; transition: 0.5s; }
        .status-line.active { opacity: 1; color: var(--accent); }
        .status-line.done { opacity: 0.6; color: #fff; }

        .verdict-box { margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); }
        .verdict-adal { color: #00ffcc; font-size: 2rem; font-weight: 900; }
        .verdict-aram { color: #ff4d4d; font-size: 2rem; font-weight: 900; }

        .solana-link {
            display: block; margin-top: 15px; color: var(--accent);
            text-decoration: none; font-size: 0.8rem; background: rgba(0,255,204,0.1);
            padding: 12px; border-radius: 8px; text-align: center;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div class="logo">KASE ESG PORTAL</div>
        <div style="font-size: 0.7rem; color: #888;">NODE_ID: PROTOQOL_MAIN_GW</div>
    </div>

    <div class="grid">
        <div>
            <div style="font-size: 0.8rem; color: #888; margin-bottom: 8px;">ОПИСАНИЕ CSR-ОТЧЕТА</div>
            <textarea id="desc" rows="5">Доставил 3 мешка продуктов пожилой семье в районе Москвы (Актобе).</textarea>
            
            <input type="text" id="mission-id" value="elders_aktobe">
            
            <button class="btn" onclick="sendToAudit()">🔥 ОТПРАВИТЬ НА НЕЙРО-АУДИТ</button>
            <button class="btn" style="background: transparent; color: var(--accent); border: 1px solid var(--accent); margin-top: 10px;" onclick="generateScenario()">🎲 ГЕНЕРАТОР СЦЕНАРИЕВ</button>
        </div>

        <div id="result-box">
            <div id="loading-sequence"></div>
            <div id="final-outcome"></div>
        </div>
    </div>
</div>

<script>
    const steps = [
        "📡 Синхронизация с узлами Нейро-Совета...",
        "🛡️ Нода Аудитора: Сканирование метаданных...",
        "🕵️ Нода Скептика: Проверка на фрод и AI-генерацию...",
        "✨ Социальный Бий: Оценка общественного импакта (Asar)...",
        "🏛️ Мастер-Бий: Финализация консенсуса в Solana..."
    ];

    async function generateScenario() {
        const res = await fetch('http://localhost:8000/api/v1/generate_mock_scenario');
        const data = await res.json();
        document.getElementById('desc').value = data.description;
        document.getElementById('mission-id').value = data.mission_id;
    }

    async function sendToAudit() {
        const resultBox = document.getElementById('result-box');
        const loadingSeq = document.getElementById('loading-sequence');
        const outcome = document.getElementById('final-outcome');
        
        resultBox.style.visibility = 'visible';
        loadingSeq.innerHTML = '';
        outcome.innerHTML = '';

        // RUN DYNAMIC LOG ECHOES
        let stepIdx = 0;
        const interval = setInterval(() => {
            if (stepIdx < steps.length) {
                const p = document.createElement('div');
                p.className = 'status-line active';
                p.innerText = steps[stepIdx];
                loadingSeq.appendChild(p);
                if (stepIdx > 0) loadingSeq.children[stepIdx-1].className = 'status-line done';
                stepIdx++;
            }
        }, 1200);

        try {
            const res = await fetch('http://localhost:8000/api/v1/etch_deed', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-API-Key': 'PQ_DEV_TEST_2026' },
                body: JSON.stringify({
                    description: document.getElementById('desc').value,
                    mission_id: document.getElementById('mission-id').value,
                    nomad_id: "KASE_USER",
                    source: "KASE_PORTAL"
                })
            });

            const data = await res.json();
            clearInterval(interval);

            // Wait a bit to finish the effect
            setTimeout(() => {
                loadingSeq.innerHTML = '✅ НЕЙРО-КОНСЕНСУС ДОСТИГНУТ';
                const colorClass = data.verdict === 'ADAL' ? 'verdict-adal' : 'verdict-aram';
                outcome.innerHTML = `
                    <div class="verdict-box">
                        <div class="${colorClass}">${data.verdict}</div>
                        <div style="font-size: 0.8rem; margin: 10px 0; font-family: monospace;">HASH: ${data.integrity_hash}</div>
                        <p style="font-style: italic; color: #FFD700;">"${data.wisdom}"</p>
                        <a href="http://localhost:8000/audit/${data.integrity_hash}" target="_blank" class="solana-link">🔍 СМОТРЕТЬ ГЛАСС-БОКС (Audit Mirror)</a>
                    </div>
                `;
            }, 500);

        } catch (e) {
            clearInterval(interval);
            loadingSeq.innerHTML = '❌ ОШИБКА БЭКЕНДА. Запустите python3 main.py';
        }
    }
</script>

</body>
</html>
